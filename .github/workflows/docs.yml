name: Docs

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.x
          
      - name: Install MkDocs
        run: |
          pip install mkdocs-material mkdocs-static-i18n
          
      - name: Deploy Docs
        working-directory: ./docs
        run: mkdocs gh-deploy --force

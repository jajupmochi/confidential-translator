site_name: Confidential Translator
site_description: A fully offline, privacy-first document translation system powered by local LLMs.
site_url: https://example.github.io/confidential-translator/
repo_url: https://github.com/example/confidential-translator

theme:
  name: material
  logo: assets/logo.png
  favicon: assets/favicon.ico
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight

plugins:
  - search

markdown_extensions:
  - attr_list
  - md_in_html
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - admonition

nav:
  - Home: index.md
  - Getting Started: 
    - Installation: getting-started/installation.md
    - Model Setup: getting-started/model-setup.md
  - User Guide:
    - Dashboard: guide/dashboard.md
    - Text Translation: guide/text.md
    - Document Translation: guide/documents.md
    - History & Export: guide/history.md
  - Developers:
    - Architecture: dev/architecture.md
    - API Reference: dev/api.md
    - UI Components (Storybook): dev/storybook.md
